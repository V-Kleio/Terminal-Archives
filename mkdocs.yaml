site_name: The Terminal Archives
site_description: Comprehensive Shell & Git Documentation
site_author: "KleioV"
site_url: https://YOUR_USERNAME.github.io/terminal-archives/
repo_url: https://github.com/YOUR_USERNAME/terminal-archives
repo_name: terminal-archives
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 Rafael Marchel D. Wijaya

# Theme Configuration
theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant        # Instant loading
    - navigation.tracking       # URL tracking
    - navigation.tabs           # Top-level sections as tabs
    - navigation.sections       # Sections in sidebar
    - navigation.expand         # Expand sections by default
    - navigation.top            # Back to top button
    - navigation.path           # Add breadcrumbs
    - toc.follow                # ToC is automatically scrolled
    - search.suggest            # Search suggestions
    - search.highlight          # Highlight search terms
    - search.share              # Share search results
    - content.code.copy         # Copy button for code blocks
    - content.tabs.link         # Link tabbed content
    - content.code.annotate     # Code annotations
    - navigation.footer

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags

# Extra CSS and JavaScript
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Social and Footer
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR_USERNAME

  generator: false  # Remove "Made with Material for MkDocs"

# Navigation Structure
nav:
  - Home: index.md

  - Terminal:
    - Intro to Terminal: module1/01_intro.md
    - Navigation: module1/02_navigation.md
    - Manipulating Files: module1/03_file_manipulation.md
    - Reading Files: module1/04_reading_files.md
    - Wildcards: module1/05_text_power.md
    - IO Redirection: module1/06_io_redirection.md
    - Appendix: module1/99_additional.md
